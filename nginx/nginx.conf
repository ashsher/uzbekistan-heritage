upstream django {
    server web:8000 max_fails=3 fail_timeout=30s;
}

resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name 77.83.206.251 uzbekistan-heritage.uz www.uzbekistan-heritage.uz;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name 77.83.206.251 uzbekistan-heritage.uz www.uzbekistan-heritage.uz;
    
    ssl_certificate /etc/letsencrypt/live/uzbekistan-heritage.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uzbekistan-heritage.uz/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    client_max_body_size 20M;
    
    location / {
        proxy_pass http://django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
    
    location /static/ {
        alias /app/staticfiles/;
    }
    
    location /media/ {
        alias /app/media/;
    }
}